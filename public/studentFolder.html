<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subject Folder</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  background:#eef3f9;
  font-family:Segoe UI;
}

.header{
  background:linear-gradient(90deg,#0d6efd,#003f88);
  color:white;
  padding:15px;
  text-align:center;
}

.folder{
  background:white;
  border-radius:20px;
  padding:30px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}

.folder:hover{
  transform:translateY(-6px);
}
</style>
</head>
<body>

<div class="header">
  <h2 id="subjectTitle">Subject Folder</h2>
  <button onclick="goBack()" class="btn btn-light mt-2">⬅ Back to Subjects</button>
</div>

<div class="container mt-4">
  <div class="row g-4">

    <div class="col-md-3">
      <div class="folder" onclick="openSection('documents')">
        📄<h4>Documents</h4>
      </div>
    </div>

    <div class="col-md-3">
      <div class="folder" onclick="openSection('videos')">
        🎬<h4>Videos</h4>
      </div>
    </div>

    <div class="col-md-3">
      <div class="folder" onclick="openSection('quizzes')">
        ❓<h4>Quizzes</h4>
      </div>
    </div>

    <div class="col-md-3">
      <div class="folder" onclick="openSection('games')">
        🧠<h4>Mind Games</h4>
      </div>
    </div>

  </div>

  <hr class="my-4">

  <div id="contentArea"></div>

</div>

<script>
const subject = localStorage.getItem("selectedSubject");
const grade = localStorage.getItem("selectedGrade");

document.getElementById("subjectTitle").innerText =
subject + " - " + grade;

function goBack(){
  window.history.back();
}

async function openSection(type){
  const area = document.getElementById("contentArea");
  area.innerHTML = "<h4>Loading...</h4>";

  if(type === "documents" || type==="videos"){
    const res = await fetch(`/api/materials?subject=${subject}&grade=${grade}`);
    const data = await res.json();

    let filtered = data.filter(m=>{
      if(type==="documents") return m.file.endsWith(".pdf");
      if(type==="videos") return m.file.endsWith(".mp4");
    });

    area.innerHTML = "<h3>"+type.toUpperCase()+"</h3>";

    filtered.forEach(m=>{
      area.innerHTML += `
        <div class="card p-3 mb-2">
          <h5>${m.title}</h5>
          <a href="/uploads/${m.file}" target="_blank" class="btn btn-primary">Open</a>
        </div>
      `;
    });
  }

  if(type==="quizzes"){
    const res = await fetch(`/api/quizzes?subject=${subject}&grade=${grade}`);
    const data = await res.json();

    area.innerHTML="<h3>QUIZZES</h3>";

    data.forEach(q=>{
      area.innerHTML += `
        <div class="card p-3 mb-2">
          <button class="btn btn-success" onclick='startQuiz(${JSON.stringify(q.questions)})'>
          Start Quiz
          </button>
        </div>
      `;
    });
  }

  if(type==="games"){
    const res = await fetch(`/api/games?subject=${subject}&grade=${grade}`);
    const data = await res.json();

    area.innerHTML="<h3>MIND GAMES</h3>";

    data.forEach(g=>{
      area.innerHTML += `
        <div class="card p-3 mb-2">
          <a href="/uploads/${g.file}" target="_blank" class="btn btn-warning">
          Play Game
          </a>
        </div>
      `;
    });
  }
}

function startQuiz(questions){
  let score=0;

  questions.forEach(q=>{
    let ans = prompt(q.question + "\n" + q.options.join(", "));
    if(ans === q.answer) score++;
  });

  alert("Score: "+score+"/"+questions.length);
}
</script>

</body>
</html>
