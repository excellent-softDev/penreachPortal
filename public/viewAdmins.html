<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Admins - STEAM LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <h2>All Admins</h2>
  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Name</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody id="adminsTable"></tbody>
  </table>

  <script>
    async function loadAdmins() {
      const res = await fetch("/api/admin"); // GET all admins
      const admins = await res.json();

      const tbody = document.getElementById("adminsTable");
      tbody.innerHTML = "";
      admins.forEach(a => {
        tbody.innerHTML += `
          <tr>
            <td>${a._id}</td>
            <td>${a.username}</td>
            <td>${a.name}</td>
            <td>${a.email}</td>
          </tr>
        `;
      });
    }

    loadAdmins();
  </script>

</body>
</html>
