/* ================= GLOBAL ================= */

body{

/* ================= STATS ================= */

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

}

.stat-card{

.stat-card:hover{

.stat-number{

.stat-card:nth-child(1){ background:linear-gradient(135deg,#ff6b6b,#ff9f43);}
.stat-card:nth-child(2){ background:linear-gradient(135deg,#48dbfb,#0abde3);}
.stat-card:nth-child(3){ background:linear-gradient(135deg,#1dd1a1,#10ac84);}

/* ================= FORMS ================= */

input, select{
  border-radius:12px!important;
  padding:10px!important;

input:focus, select:focus{

.quiz-question{

/* ================= SEARCH ================= */

.search-box{

.search-box:focus{

}

/* ================= BUTTONS ================= */

.btn{
  border-radius:30px;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.07);

}

/* ================= MEDIA ================= */

video, iframe{

  max-height:250px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);

</style>

<script>

 const sections = ["profile","documents","videos","quizzes","games","analytics"];

// ================= DARK MODE =================

document.getElementById("adminEmail").innerText = adminData.email;

// ================= SUBJECTS & GRADES =================
 // ================= SUBJECTS & GRADES =================

// Generate grades 1–12
const grades = Array.from({length:12},(_,i)=>i+1);

// 🔥 NEW: Grade-based subcategory logic
function getSubcategories(subject, grade){

  grade = parseInt(grade);

  // ===== SCIENCE =====
  if(subject === "Science"){
    if(grade >= 10){
      return ["Physical Sciences","Life Sciences","Chemistry"];
    }
    return []; // Grade 1–9 → NO subcategories
  }

  // ===== ENGINEERING =====
  if(subject === "Engineering"){
    if(grade >= 10){
      return ["Mechanical","Electrical","Civil"];
    }
    return []; // Grade 1–9 → NO subcategories
  }

  // ===== ARTS (ALL GRADES) =====
  if(subject === "Arts"){
    return ["Drawing","Painting"];
  }

  // ===== Others =====
  return [];
}

// 🔥 Updated populate function (GRADE FIRST logic)
 function populateSubcatAndGrades(subjectId, subcatId, gradeId){

  const subjectSelect = document.getElementById(subjectId);
  const subcatSelect = document.getElementById(subcatId);
  const gradeSelect = document.getElementById(gradeId);

  // Generate grades 1–12
  gradeSelect.innerHTML = `<option value="">Select Grade First</option>`;
  for(let i=1;i<=12;i++){
    gradeSelect.innerHTML += `<option value="${i}">Grade ${i}</option>`;
  }

  // 🔒 Disable subject & subcategory initially
  subjectSelect.disabled = true;
  subcatSelect.style.display = "none";

  // 🔥 When grade changes → enable subject
  gradeSelect.addEventListener("change", ()=>{
    if(gradeSelect.value){
      subjectSelect.disabled = false;
    } else {
      subjectSelect.disabled = true;
      subcatSelect.style.display = "none";
    }
  });

  function updateSubcategories(){
    const subject = subjectSelect.value;
    const grade = parseInt(gradeSelect.value);

    subcatSelect.innerHTML = `<option value="">Subcategory (optional)</option>`;

    if(!subject || !grade){
      subcatSelect.style.display = "none";
      return;
    }

    const subcats = getSubcategories(subject, grade);

    if(subcats.length === 0){
      subcatSelect.style.display = "none";
    } else {
      subcatSelect.style.display = "block";
      subcats.forEach(sc=>{
        subcatSelect.innerHTML += `<option value="${sc}">${sc}</option>`;
      });
    }
  }

  subjectSelect.addEventListener("change", updateSubcategories);
}

// Apply to all forms
["docSubject","videoSubject","quizSubject","gameSubject"].forEach(id=>{
  const subId = id.replace("Subject","Subcat");
  const gradeId = id.replace("Subject","Grade");
  populateSubcatAndGrades(id,subId,gradeId);
});
// ================= DATA ARRAYS =================
let documents=[], videos=[], quizzes=[], games=[];

// ================= LOAD ALL =================
async function loadAll(){
  documents = await (await fetch("/api/documents")).json();
  videos = await (await fetch("/api/videos")).json();
  quizzes = await (await fetch("/api/quizzes")).json();
  games = await (await fetch("/api/games")).json();

  document.getElementById("totalMaterials").innerText = documents.length;
  document.getElementById("totalVideos").innerText = videos.length;
  document.getElementById("totalQuizzes").innerText = quizzes.length;
  document.getElementById("totalGames").innerText = games.length;

  renderList("materialsList",documents,"file","searchDocs");
  renderList("videosList",videos,"video","searchVideos");
  renderList("quizzesList",quizzes,"quiz");
  renderList("gamesList",games,"game","searchGames");
}

// ================= RENDER LIST =================
function renderList(containerId,list,type,searchId=""){
  const container = document.getElementById(containerId);
  container.innerHTML="";
  let searchText = searchId ? document.getElementById(searchId).value.toLowerCase() : "";
  list.filter(item=>{
    const combined = ((item.title||"")+" "+(item.subject||"")+" "+(item.subCategory||"")).toLowerCase();
    return combined.includes(searchText);
  }).forEach(item=>{
    const subjectHtml = item.subCategory ? `${item.subject} <span class="badge bg-primary">${item.subCategory}</span>` : item.subject;
    const gradeText = item.grade||"";
    let content="";

if(type==="file"){

  content = `
    <a href="/uploads/${item.file}" target="_blank"
    class="btn btn-success btn-sm mb-2 w-100">
    Download Document
    </a>
    <button onclick="generateQuizFromDocument('${item._id}')"
    class="btn btn-purple btn-sm w-100">
    🤖 Auto Generate Quiz (AI)
    </button>
  `;
}
     

 
    else if(type==="video"){
      if(item.link) content = item.link.includes("youtube.com") ? `<iframe width="100%" height="200" src="${item.link.replace("watch?v=","embed/")}" frameborder="0" allowfullscreen></iframe>` : `<video controls src="${item.link}"></video>`;
      else if(item.file) content=`<video controls src="/uploads/${item.file}"></video>`;
      else content="<p>No video</p>";
    } else if(type==="quiz"){
      content = item.questions.map((q,i)=>`<div class="quiz-question"><strong>Q${i+1}:</strong> ${q.question}<br>${q.options.map(o=>`- ${o}<br>`).join("")}<em>Answer: ${q.answer}</em></div>`).join("");
    } else if(type==="game") content=`<a href="/uploads/${item.gameFile}" target="_blank" class="btn btn-warning w-100">Play</a>`;

    container.innerHTML+=`<div class="col-md-4 mb-3"><div class="card p-3"><h5>${item.title}</h5><p>${gradeText} - ${subjectHtml}</p>${content}<button onclick="deleteItem('${item._id}','${type}')" class="btn btn-danger btn-sm mt-2">Delete</button></div></div>`;
  });
}

// ================= DELETE =================
async function deleteItem(id,type){
  if(!confirm("Are you sure?")) return;
  let apiType = type==="file"?"documents":type==="video"?"videos":type==="quiz"?"quizzes":"games";
  const res = await fetch(`/api/${apiType}/${id}`,{method:"DELETE"});
  const data = await res.json();
  if(res.ok) loadAll();
  else alert(data.msg||"Delete failed");
}

// ================= FORM SUBMITS =================
 document.getElementById("uploadForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const form = e.target;
  const fileInput = form.querySelector("[name='file']");
  const file = fileInput.files[0];

  if(!file){
    alert("Select a file");
    return;
  }

  const formData = new FormData(form);

  try{
    const res = await fetch("/api/documents",{
      method:"POST",
      body: formData
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.msg || "Upload failed");
      return;
    }

    alert("Upload successful");

    form.reset();
    loadAll();

  }catch(err){
    console.error(err);
    alert("Server connection error");
  }

});
document.getElementById("videoForm").addEventListener("submit",async e=>{
  e.preventDefault(); const formData=new FormData(e.target);
  await fetch("/api/videos",{method:"POST",body:formData});
  e.target.reset(); loadAll();
});

// ================= QUIZ =================
let questions=[];
function addQuestion(){
  const container = document.getElementById("questionsContainer");
  const index = questions.length;
  const div = document.createElement("div");
  div.className="quiz-question";
  div.innerHTML=`
    <input type="text" placeholder="Question" class="form-control mb-1" data-index="${index}" data-type="question">
    <input type="text" placeholder="Option 1" class="form-control mb-1" data-index="${index}" data-type="option">
    <input type="text" placeholder="Option 2" class="form-control mb-1" data-index="${index}" data-type="option">
    <input type="text" placeholder="Option 3" class="form-control mb-1" data-index="${index}" data-type="option">
    <input type="text" placeholder="Option 4" class="form-control mb-1" data-index="${index}" data-type="option">
    <input type="text" placeholder="Answer" class="form-control mb-1" data-index="${index}" data-type="answer">
  `;
  container.appendChild(div);
  questions.push({question:"",options:["","","",""],answer:""});
}

async function saveQuiz(){
  const qDivs = document.querySelectorAll("#questionsContainer .quiz-question");
  qDivs.forEach((div,i)=>{
    questions[i].question = div.querySelector('[data-type="question"]').value;
    questions[i].options = Array.from(div.querySelectorAll('[data-type="option"]')).map(inp=>inp.value);
    questions[i].answer = div.querySelector('[data-type="answer"]').value;
  });
  const payload = {
    title:`Quiz ${Date.now()}`,
    subject:document.getElementById("quizSubject").value,
    subCategory:document.getElementById("quizSubcat").value,
    grade:document.getElementById("quizGrade").value,
    questions
  };
  await fetch("/api/quizzes",{method:"POST",body:JSON.stringify(payload),headers:{"Content-Type":"application/json"}});
  questions=[]; document.getElementById("questionsContainer").innerHTML="";
  loadAll();
}

// ================= ANALYTICS INTELLIGENCE =================

let materialsChart=null;
let subjectsChart=null;

async function loadAnalytics(){

  try{

    const [docsRes,videosRes,quizRes,gamesRes] = await Promise.all([
      fetch("/api/documents"),
      fetch("/api/videos"),
      fetch("/api/quizzes"),
      fetch("/api/games")
    ]);

    const documents = await docsRes.json();
    const videos = await videosRes.json();
    const quizzes = await quizRes.json();
    const games = await gamesRes.json();

    // ===== Material Type Distribution =====

    const ctx1 = document.getElementById("materialsChart");

    if(materialsChart) materialsChart.destroy();

    materialsChart = new Chart(ctx1,{
      type:"doughnut",
      data:{
        labels:["Documents","Videos","Quizzes","Games"],
        datasets:[{
          data:[
            documents.length,
            videos.length,
            quizzes.length,
            games.length
          ],
          backgroundColor:[
            "#ff6b6b",
            "#48dbfb",
            "#1dd1a1",
            "#5f27cd"
          ]
        }]
      },
      options:{
        plugins:{
          title:{
            display:true,
            text:"Learning Resource Distribution"
          }
        }
      }
    });

    // ===== Subject Distribution =====

    const subjectCount={};

    [...documents,...videos,...quizzes,...games].forEach(item=>{
      if(item.subject){
        subjectCount[item.subject]=
          (subjectCount[item.subject]||0)+1;
      }
    });

    const ctx2 = document.getElementById("subjectsChart");

    if(subjectsChart) subjectsChart.destroy();

    subjectsChart = new Chart(ctx2,{
      type:"bar",
      data:{
        labels:Object.keys(subjectCount),
        datasets:[{
          label:"Resources per Subject",
          data:Object.values(subjectCount)
        }]
      },
      options:{
        plugins:{
          title:{
            display:true,
            text:"Subject Intelligence Overview"
          }
        }
