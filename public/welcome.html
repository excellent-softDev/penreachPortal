 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penreach STEAM Portal</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  font-family: "Segoe UI", sans-serif;
  overflow: hidden;
  color: white;
}

/* ---------- Fullscreen Steps ---------- */
.step {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity 0.8s ease;
}

#step1 {
  background: url("/images/col.jpeg") no-repeat center center;
  background-size: cover;
}

#step2 {
  background: url("/images/steam.jpeg") no-repeat center center;
  background-size: cover;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ---------- Overlay for contrast ---------- */
.step::before {
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background-color: rgba(0,0,0,0.5);
  z-index:-1;
}

/* ---------- Floating STEAM icons ---------- */
.steam-icon {
  position: absolute;
  font-size: 2rem;
  opacity: 0.6;
  animation: float 15s infinite linear;
  pointer-events: none;
}
@keyframes float {
  0% { transform: translateY(0) rotate(0deg);}
  50% { transform: translateY(-30px) rotate(180deg);}
  100% { transform: translateY(0) rotate(360deg);}
}

/* ---------- Portal container ---------- */
.portal-container {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  width: 100%;
  max-width: 600px;
}

/* ---------- Name input ---------- */
#studentName {
  font-size: 1.8rem;
  padding: 15px 25px;
  border-radius: 50px;
  border: none;
  outline: none;
  text-align: center;
  margin-top: 30px;
  background: rgba(0,0,0,0.6);
  color: white;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
#studentName:focus {
  background: rgba(0,0,0,0.7);
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

/* ---------- Buttons ---------- */
button {
  margin-top: 25px;
  padding: 15px 40px;
  font-size: 1.5rem;
  font-weight: bold;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  background: rgba(0,0,0,0.7);
  color: white;
  transition: transform 0.3s, box-shadow 0.3s;
}
button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px rgba(0,0,0,0.8);
}

/* ---------- Animated welcome text ---------- */
#animatedWelcome {
  font-size: 3rem;
  font-weight: bold;
  margin-bottom: 20px;
}
#animatedWelcome span {
  display: inline-block;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeInUp 0.5s forwards;
}
@keyframes fadeInUp {
  0% {opacity:0; transform: translateY(30px);}
  100% {opacity:1; transform: translateY(0);}
}

/* ---------- Responsive ---------- */
@media(max-width: 600px){
  #studentName { font-size: 1.5rem; }
  button { font-size: 1.2rem; padding: 12px 25px; }
  #animatedWelcome { font-size: 2rem; }
}
</style>
</head>
<body>

<!-- Floating STEAM icons -->
<div class="steam-icon" style="top:10%; left:15%;">🔬</div>
<div class="steam-icon" style="top:30%; left:70%;">⚙️</div>
<div class="steam-icon" style="top:50%; left:40%;">🎨</div>
<div class="steam-icon" style="top:70%; left:20%;">📐</div>
<div class="steam-icon" style="top:80%; left:80%;">💻</div>

<!-- Step 1: Name input -->
<div id="step1" class="step">
  <div class="portal-container">
    <h1>Welcome to Penreach STEAM</h1>
    <h3>Enter your name to begin your adventure</h3>
    <input type="text" id="studentName" placeholder="Your name here">
    <button id="nextBtn">Next</button>
  </div>
</div>

<!-- Step 2: Animated Welcome -->
<div id="step2" class="step hidden">
  <div class="portal-container">
    <h1 id="animatedWelcome"></h1>
    <p>Get ready to explore exciting STEAM resources!</p>
    <button id="continueBtn">Enter Dashboard</button>
  </div>
</div>

<script>
// ---------- Step transition ----------
const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const nextBtn = document.getElementById("nextBtn");
const continueBtn = document.getElementById("continueBtn");
const animatedWelcome = document.getElementById("animatedWelcome");

function animateText(text, element){
  element.innerHTML = "";
  [...text].forEach((char,i)=>{
    const span = document.createElement("span");
    span.textContent = char;
    span.style.animationDelay = `${i*0.05}s`;
    element.appendChild(span);
  });
}

nextBtn.addEventListener("click", () => {
  const name = document.getElementById("studentName").value.trim();
  if(!name){ alert("Please enter your name!"); return; }
  sessionStorage.setItem("studentName", name);

  step1.classList.add("hidden");

  setTimeout(() => {
    step2.classList.remove("hidden");
    animateText(`Welcome, ${name}!`, animatedWelcome);
  }, 800);
});

continueBtn.addEventListener("click", () => {
  window.location.href = "/"; // Redirect to main dashboard
});
</script>

</body>
</html>
